stages:
  - lint
  - test
  - typecheck

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONPATH: "."

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip

default:
  image: python:3.11-slim
  tags:
    - docker

  before_script:
    - apt-get update -y && apt-get install -y --no-install-recommends ffmpeg git libsndfile1 rubberband-cli
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt


lint:
  stage: lint
  script:
    - source .venv/bin/activate
    - pip install ruff
    - ruff check .

typecheck:
  stage: typecheck
  script:
    - source .venv/bin/activate
    - pip install mypy
    - mypy .

test:
  stage: test
  script:
    - source .venv/bin/activate
    - pip install pytest pytest-cov
    - pytest tests/ -v
        --cov=.
        --cov-report=term-missing
        --cov-report=xml:coverage.xml
        --junitxml=report.xml

  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'

  artifacts:
    when: always
    reports:
      junit: report.xml
    paths:
      - coverage.xml
      - report.xml
    expire_in: 30 days